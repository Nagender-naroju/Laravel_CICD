name: Laravel_CICD

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, fileinfo, json, tokenizer, pdo, bcmath, openssl

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy env file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Setup SQLite (for testing)
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /var/www/html/Laravel_CICD

            # Pull latest code
            git pull origin main

            # Install dependencies
            sudo -u www-data composer install --no-interaction --prefer-dist --optimize-autoloader

            # Clear and cache config
            sudo -u www-data php artisan config:clear
            sudo -u www-data php artisan cache:clear
            sudo -u www-data php artisan view:clear
            sudo -u www-data php artisan route:clear

            # Run migrations
            sudo -u www-data php artisan migrate --force

            # Cache for production
            sudo -u www-data php artisan config:cache
            sudo -u www-data php artisan route:cache
            sudo -u www-data php artisan view:cache

            # Fix permissions
            sudo chown -R www-data:www-data /var/www/html/Laravel_CICD
            sudo chmod -R 775 /var/www/html/Laravel_CICD/storage
            sudo chmod -R 775 /var/www/html/Laravel_CICD/bootstrap/cache

            # Restart Apache
            sudo systemctl restart apache2